/* ══ 设计原则：用颜色深浅区分层级，不用透明度让文字变淡 ══ */
:root{
  --g:#d4af37;          /* 主金色 */
  --gl:#fcf6ba;         /* 亮金 */
  --gd:#b8922e;         /* 深金 */
  --text-primary:#d4af37;    /* 主要文字：纯金色 */
  --text-secondary:#a07828;  /* 次要文字：深金，仍可读 */
  --text-muted:#6b5020;      /* 辅助文字：更深，但绝不透明 */
  --border:#3d2e0e;          /* 边框：深棕金 */
  --gold:linear-gradient(135deg,#d4af37 0%,#fcf6ba 50%,#d4af37 100%);
  --gold-v:linear-gradient(180deg,#d4af37 0%,#fcf6ba 50%,#d4af37 100%);
  --gold-h:linear-gradient(90deg,transparent,#3d2e0e 50%,transparent);
  --ink:#080808;--max:1100px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;scroll-padding-top:60px}
body{background:var(--ink);font-family:"PingFang SC","Hiragino Sans GB","Noto Serif SC","Microsoft YaHei",serif;color:var(--text-primary);overflow-x:hidden;-webkit-font-smoothing:antialiased;font-weight:300}

/* ══ LOADER ══ */
#loader{position:fixed;inset:0;background:var(--ink);z-index:9990;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;cursor:pointer;transition:opacity .8s ease,visibility .8s ease}
#loader.done{opacity:0;visibility:hidden;pointer-events:none}
.loader-phase{display:flex;flex-direction:column;align-items:center;gap:20px;transition:opacity .5s ease,transform .5s ease}
#loader.ready .loader-phase{opacity:0;transform:translateY(-12px);pointer-events:none}
.loader-brand{font-size:15px;letter-spacing:10px;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:400}
.loader-bar{width:120px;height:1px;background:#1a1208;position:relative;overflow:hidden}
.loader-bar::after{content:"";position:absolute;left:-100%;top:0;bottom:0;width:100%;background:var(--gold);animation:load-slide 1.2s ease forwards}
@keyframes load-slide{to{left:0}}
.enter-phase{position:absolute;display:flex;flex-direction:column;align-items:center;gap:28px;opacity:0;transform:translateY(10px);pointer-events:none;transition:opacity .6s ease .1s,transform .6s ease .1s}
#loader.ready .enter-phase{opacity:1;transform:translateY(0);pointer-events:auto}
.enter-logo{font-size:14px;letter-spacing:10px;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:400;margin-bottom:8px}
.enter-slogan{font-size:13px;letter-spacing:5px;color:var(--text-secondary);font-family:"Helvetica Neue",sans-serif}
.enter-btn{display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:8px}
.enter-circle{width:68px;height:68px;border-radius:50%;border:1px solid var(--gd);display:flex;align-items:center;justify-content:center;position:relative;transition:border-color .3s}
.enter-circle::before{content:"";position:absolute;inset:-10px;border-radius:50%;border:1px solid #3d2e0e;animation:pulse-ring 2.4s ease-in-out infinite}
.enter-circle::after{content:"";position:absolute;inset:-20px;border-radius:50%;border:1px solid #2a1f08;animation:pulse-ring 2.4s ease-in-out infinite .4s}
@keyframes pulse-ring{0%{transform:scale(.92);opacity:0}40%{opacity:1}100%{transform:scale(1.12);opacity:0}}
#loader:hover .enter-circle{border-color:var(--g)}
.enter-circle i{font-size:22px;color:var(--g)}
.enter-text{font-size:12px;letter-spacing:5px;color:var(--text-secondary);font-family:"Helvetica Neue",sans-serif;text-transform:uppercase}

/* ══ 进度条 ══ */
#progress{position:fixed;top:0;left:0;height:1px;background:var(--gold);z-index:9999;width:0%;pointer-events:none;transition:width .08s linear}

/* ══ 音乐 ══ */
.music-btn{position:fixed;top:18px;left:20px;z-index:1100;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);cursor:pointer;transition:border-color .3s}
.music-btn:hover{border-color:var(--gd)}
.music-btn i{font-size:13px;color:var(--text-secondary);transition:color .4s}
@keyframes spin{to{transform:rotate(360deg)}}
.music-btn.playing i{animation:spin 6s linear infinite;color:var(--g)}

/* ══ 顶부 导航 ══ */
.topbar{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;background:transparent;backdrop-filter:blur(0);transition:background .4s,backdrop-filter .4s,border-color .4s;border-bottom:1px solid transparent}
.topbar.scrolled{background:rgba(8,8,8,.95);backdrop-filter:blur(16px);border-color:var(--border)}
.topbar-brand{font-size:13px;letter-spacing:5px;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:400;margin-left:48px;white-space:nowrap}
.topbar-nav{display:flex;align-items:center;gap:4px}
.topbar-nav a{font-size:12px;letter-spacing:3px;color:var(--text-secondary);text-decoration:none;padding:6px 14px;transition:color .3s;font-family:"Helvetica Neue",sans-serif;white-space:nowrap;position:relative}
.topbar-nav a::after{content:"";position:absolute;bottom:2px;left:14px;right:14px;height:1px;background:var(--g);transform:scaleX(0);transform-origin:center;transition:transform .3s}
.topbar-nav a:hover,.topbar-nav a.active{color:var(--g)}
.topbar-nav a.active::after{transform:scaleX(1)}
.topbar-ext{display:flex;gap:18px;align-items:center}
.topbar-ext a{font-size:11px;letter-spacing:2px;color:var(--text-muted);text-decoration:none;transition:color .3s;font-family:"Helvetica Neue",sans-serif;white-space:nowrap}
.topbar-ext a:hover{color:var(--g)}
@media(max-width:900px){
  .topbar-nav{display:none}
  .topbar-brand{margin-left:44px;font-size:12px}
  .topbar-ext a:first-child{display:none}
}

/* ══ 淡入 ══ */
.fade{opacity:0;transform:translateY(18px);transition:opacity .8s cubic-bezier(.25,.46,.45,.94),transform .8s cubic-bezier(.25,.46,.45,.94)}
.fade.in{opacity:1;transform:none}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.32s}.d4{transition-delay:.46s}.d5{transition-delay:.6s}
.line-x{width:0;height:1px;background:var(--gold);margin:0 auto;transition:width 1s cubic-bezier(.25,.46,.45,.94)}
.line-x.in{width:56px}

/* ══ 通用标题 ══ */
.sec-head{text-align:center;margin-bottom:60px}
.sec-en{display:block;font-size:12px;letter-spacing:6px;color:var(--text-secondary);margin-bottom:14px;font-family:"Helvetica Neue",sans-serif;text-transform:uppercase}
.sec-zh{display:block;font-size:22px;letter-spacing:6px;color:var(--text-primary);font-weight:300;margin-bottom:18px;line-height:1.6}
.hr-gold{width:100%;height:1px;background:var(--gold-h);border:none;margin:0}

/* ══ Toast ══ */
#toast{position:fixed;bottom:calc(28px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(10px);background:#0f0b04;border:1px solid var(--gd);backdrop-filter:blur(14px);padding:12px 28px;font-size:13px;letter-spacing:4px;color:var(--g);white-space:nowrap;z-index:6000;border-radius:2px;opacity:0;pointer-events:none;transition:opacity .32s,transform .32s cubic-bezier(.25,.46,.45,.94)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ 悬浮回顶 ══ */
#back-top{position:fixed;bottom:calc(28px + env(safe-area-inset-bottom));right:20px;z-index:1000;width:36px;height:36px;border:1px solid var(--border);background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .4s,border-color .3s,transform .25s}
#back-top.show{opacity:1;pointer-events:auto}
#back-top:hover{border-color:var(--gd);transform:translateY(-3px)}
#back-top i{font-size:12px;color:var(--text-secondary)}

/* ══ HERO ══ */
.hero{position:relative;width:100%;min-height:100vh;display:flex;align-items:stretch;overflow:hidden;background:var(--ink)}
.hero-left{position:relative;z-index:2;flex:0 0 48%;min-width:0;display:flex;flex-direction:column;justify-content:center;padding:100px 48px 80px 8%;background:var(--ink)}
.hero-left::after{content:"";position:absolute;right:0;top:10%;bottom:10%;width:1px;background:var(--gold-v);opacity:.3}
.hero-right{flex:0 0 52%;position:relative;overflow:hidden}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:35% center;z-index:0;transform:scale(1.03);transition:transform 1.5s ease-out}
.hero-img.loaded{transform:scale(1)}
.hero-right::before{content:"";position:absolute;inset:0;z-index:1;background:linear-gradient(to right,var(--ink) 0%,rgba(8,8,8,.4) 18%,rgba(8,8,8,.05) 40%,transparent 65%)}
.hero-right::after{content:"";position:absolute;inset:0;z-index:1;background:rgba(0,0,0,.1)}
.hero-eyebrow{font-size:13px;letter-spacing:6px;color:var(--text-secondary);margin-bottom:26px;font-family:"Helvetica Neue",sans-serif;text-transform:uppercase}
.hero-title{font-size:clamp(34px,3.8vw,62px);font-weight:300;line-height:1.5;letter-spacing:.06em;color:#fff;margin-bottom:26px}
.hero-title em{font-style:normal;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:15px;letter-spacing:5px;color:rgba(255,255,255,.7);line-height:2.6;margin-bottom:48px}
.hero-cta{display:inline-flex;align-items:center;gap:12px;font-size:14px;letter-spacing:4px;color:var(--g);border:1px solid var(--gd);padding:15px 30px;cursor:pointer;transition:border-color .3s,background .3s;background:rgba(212,175,55,.08);width:fit-content;user-select:none}
.hero-cta:hover{border-color:var(--g);background:rgba(212,175,55,.14)}
.hero-cta:active{opacity:.7}
.hero-cta i{font-size:13px}
.hero-scroll{position:absolute;bottom:26px;left:24%;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:6px}
.hero-scroll span{font-size:10px;letter-spacing:5px;color:var(--text-muted);font-family:"Helvetica Neue",sans-serif}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
.hero-scroll i{font-size:12px;color:var(--text-muted);animation:bob 2.2s ease infinite}
@media(max-width:860px){
  .hero{flex-direction:column}
  .hero-left{flex:none;order:2;padding:32px 22px 56px}
  .hero-left::after{display:none}
  .hero-right{flex:none;order:1;height:58vh;min-height:300px}
  .hero-img{object-position:center 15%}
  .hero-right::before{background:linear-gradient(to bottom,transparent 35%,rgba(8,8,8,.55) 70%,var(--ink) 100%)}
  .hero-cta{display:none}
  .hero-scroll{left:50%;bottom:14px}
  .hero-title{font-size:clamp(30px,7vw,44px)}
}

/* ══ IDENTITY ══ */
.identity{background:var(--ink);padding:100px 28px 88px;position:relative}
.identity::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:1px;height:52px;background:var(--gold-v);opacity:.4}
.id-inner{max-width:860px;margin:0 auto}
.id-cols{display:grid;grid-template-columns:1fr 1.1fr;gap:72px;align-items:start}
@media(max-width:780px){.id-cols{grid-template-columns:1fr;gap:52px}}
.id-badge{font-size:13px;letter-spacing:6px;color:var(--text-secondary);margin-bottom:20px;font-family:"Helvetica Neue",sans-serif;display:block}
.id-name{font-size:clamp(46px,6vw,72px);font-weight:400;letter-spacing:.16em;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:10px}
.id-role{font-size:13px;letter-spacing:5px;color:var(--text-secondary);margin-bottom:28px;display:block}
.id-tagline{font-size:17px;letter-spacing:4px;color:var(--text-primary);line-height:3.2}
.id-tagline strong{font-weight:400;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.id-stats{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--border);margin-top:44px}
.stat{padding:24px 10px;text-align:center;background:#0d0a04}
.stat+.stat{border-left:1px solid var(--border)}
.stat-num{font-size:clamp(28px,3.5vw,40px);letter-spacing:.04em;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:6px;display:block}
.stat-unit{display:block;font-size:10px;letter-spacing:2px;color:var(--text-secondary);font-family:"Helvetica Neue",sans-serif;margin-bottom:4px}
.stat-label{font-size:12px;letter-spacing:3px;color:var(--text-secondary);display:block}
.timeline{border-left:1px solid var(--border);padding-left:24px}
.tl-item{position:relative;padding:18px 0;border-bottom:1px solid #1a1208}
.tl-item:last-child{border-bottom:none}
.tl-item::before{content:"";position:absolute;left:-30px;top:24px;width:8px;height:8px;border:1px solid var(--gd);background:var(--ink);transform:rotate(45deg)}
.tl-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.tl-year{font-size:11px;letter-spacing:3px;color:var(--text-secondary);font-family:"Helvetica Neue",sans-serif}
.tl-date{font-size:11px;letter-spacing:2px;color:var(--text-muted);font-family:"Helvetica Neue",sans-serif}
.tl-text{font-size:15px;letter-spacing:2px;color:var(--text-primary);line-height:2.2}

/* ══ SERVICES ══ */
.services{background:#050402;padding:88px 28px 96px}
.svc-grid{max-width:var(--max);margin:0 auto;display:grid;grid-template-columns:repeat(2,1fr);border:1px solid var(--border)}
@media(max-width:680px){.svc-grid{grid-template-columns:1fr}}
.svc-item{padding:40px 36px;background:#0a0804;position:relative;overflow:hidden;transition:background .4s}
.svc-item:nth-child(odd){border-right:1px solid var(--border)}
.svc-item:nth-child(n+3){border-top:1px solid var(--border)}
@media(max-width:680px){.svc-item{border-right:none!important;border-top:none!important;border-bottom:1px solid var(--border)}}
.svc-item::before{content:"";position:absolute;left:0;top:0;bottom:0;width:0;background:var(--gold-v);opacity:.15;transition:width .5s cubic-bezier(.25,.46,.45,.94)}
.svc-item:hover::before{width:3px}
.svc-item:hover{background:#0f0c06}
.svc-num{font-size:11px;letter-spacing:4px;color:var(--text-muted);margin-bottom:18px;font-family:"Helvetica Neue",sans-serif;display:block}
.svc-title{font-size:19px;letter-spacing:4px;color:var(--text-primary);margin-bottom:16px;font-weight:400;display:flex;align-items:center;gap:12px}
.svc-title i{font-size:16px;color:var(--gd)}
.svc-desc{font-size:14px;line-height:2.4;letter-spacing:2px;color:var(--text-primary);margin-bottom:20px}
.svc-tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{font-size:11px;letter-spacing:2px;padding:5px 12px;border:1px solid var(--border);color:var(--text-secondary);font-family:"Helvetica Neue",sans-serif}

/* ══ FOR WHO ══ */
.for-who{background:var(--ink);padding:88px 28px 96px}
.match-grid{max-width:var(--max);margin:0 auto;display:grid;grid-template-columns:repeat(2,1fr);border:1px solid var(--border)}
@media(max-width:680px){.match-grid{grid-template-columns:1fr}}
.match-item{display:flex;align-items:flex-start;gap:18px;padding:34px 30px;background:#0a0804;transition:background .3s}
.match-item:nth-child(odd){border-right:1px solid var(--border)}
.match-item:nth-child(n+3){border-top:1px solid var(--border)}
.match-item:hover{background:#0f0c06}
@media(max-width:680px){.match-item{border-right:none!important;border-top:none!important;border-bottom:1px solid var(--border)}}
.match-icon{width:34px;height:34px;flex-shrink:0;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-top:2px}
.match-icon i{font-size:14px;color:var(--gd)}
.match-main{font-size:16px;letter-spacing:3px;color:var(--text-primary);line-height:1.7;margin-bottom:8px}
.match-sub{font-size:13px;letter-spacing:2px;color:var(--text-secondary);line-height:2.1}

/* ══ PHILOSOPHY ══ */
.philosophy{background:#050402;padding:110px 28px;text-align:center;position:relative;overflow:hidden}
.phil-bg{position:absolute;font-size:clamp(60px,14vw,120px);font-weight:700;color:#0f0c04;left:50%;top:50%;transform:translate(-50%,-50%);white-space:nowrap;pointer-events:none;user-select:none;letter-spacing:.1em;font-family:"Helvetica Neue",sans-serif}
.phil-en{display:block;font-size:13px;letter-spacing:7px;color:var(--text-secondary);margin-bottom:44px;font-family:"Helvetica Neue",sans-serif;text-transform:uppercase}
.phil-quote{font-size:clamp(24px,4vw,36px);font-weight:300;letter-spacing:.12em;line-height:2;color:var(--text-primary);max-width:440px;margin:0 auto 44px;position:relative;z-index:1}
.phil-quote em{font-style:normal;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.phil-attrs{display:flex;justify-content:center;margin-top:52px;border:1px solid var(--border);max-width:380px;margin-left:auto;margin-right:auto}
.phil-attr{flex:1;padding:24px 16px;text-align:center;background:#0a0804}
.phil-attr+.phil-attr{border-left:1px solid var(--border)}
.phil-attr-zh{font-size:18px;letter-spacing:5px;color:var(--text-primary);margin-bottom:8px}
.phil-attr-en{font-size:10px;letter-spacing:3px;color:var(--text-secondary);font-family:"Helvetica Neue",sans-serif;text-transform:uppercase}

/* ══ TESTIMONIALS ══ */
.testimonials{background:var(--ink);padding:88px 28px 96px}
.testi-grid{max-width:var(--max);margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--border)}
@media(max-width:860px){.testi-grid{grid-template-columns:1fr}}
.testi-item{padding:36px 30px;background:#0a0804;position:relative;transition:background .3s;display:flex;flex-direction:column}
.testi-item+.testi-item{border-left:1px solid var(--border)}
.testi-item:hover{background:#0f0c06}
@media(max-width:860px){.testi-item+.testi-item{border-left:none;border-top:1px solid var(--border)}}
.testi-stars{display:flex;gap:4px;margin-bottom:20px}
.testi-stars i{font-size:12px;color:var(--g)}
.testi-mark{font-size:44px;line-height:.7;color:var(--border);font-family:Georgia,serif;margin-bottom:16px;display:block}
.testi-text{font-size:15px;letter-spacing:2px;color:var(--text-primary);line-height:2.6;margin-bottom:24px;flex:1}
.testi-text em{font-style:normal;color:var(--gl)}
.testi-meta{display:flex;align-items:center;gap:14px}

<script>
/* ── DOM refs ── */
const prog=document.getElementById('progress');
const topbar=document.getElementById('topbar');
const backTop=document.getElementById('back-top');
const toast=document.getElementById('toast');
const hImg=document.getElementById('heroImg');
const mBtn=document.getElementById('musicBtn');
const bgm=document.getElementById('bgm');
let playing=false;

/* ── Loader / Enter Screen ── */
const loader=document.getElementById('loader');

// 页面加载完成后切换到"点击进入"阶段
window.addEventListener('load',()=>{
  setTimeout(()=>loader.classList.add('ready'),1000);
});

// 点击或按键进入：播放音乐 + 关闭遮罩
function enterSite(){
  loader.classList.add('clicking');
  // 尝试播放音乐
  bgm.play().then(()=>{
    mBtn.classList.add('playing');
    playing=true;
  }).catch(()=>{});
  // 淡出遮罩
  setTimeout(()=>loader.classList.add('done'),120);
}
loader.addEventListener('click',enterSite);
loader.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();enterSite()}});

/* ── Hero 图缩放 ── */
if(hImg.complete)hImg.classList.add('loaded');
else hImg.addEventListener('load',()=>hImg.classList.add('loaded'));

/* ── IntersectionObserver 淡入 ── */
const io=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})
},{threshold:.08,rootMargin:'0px 0px -20px 0px'});
document.querySelectorAll('.fade,.line-x').forEach(el=>io.observe(el));

/* ── 导航激活高亮 ── */
const sections=['about','services','reviews','faq','contact'];
const navLinks=document.querySelectorAll('.topbar-nav a[data-section]');
const secEls=sections.map(id=>document.getElementById(id)).filter(Boolean);

const secObs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      const id=e.target.id;
      navLinks.forEach(a=>{
        a.classList.toggle('active',a.dataset.section===id);
      });
    }
  });
},{threshold:.25,rootMargin:'-60px 0px 0px 0px'});
secEls.forEach(el=>secObs.observe(el));

/* ── Scroll handler ── */
let tick=false;
function onScroll(){
  const y=window.scrollY;
  prog.style.width=(y/(document.documentElement.scrollHeight-window.innerHeight)*100)+'%';
  topbar.classList.toggle('scrolled',y>60);
  backTop.classList.toggle('show',y>700);
}
window.addEventListener('scroll',()=>{if(!tick){requestAnimationFrame(()=>{onScroll();tick=false});tick=true}},{passive:true});
onScroll();

/* ── 音乐 ── */
function toggleMusic(){
  if(!playing){bgm.play().then(()=>{mBtn.classList.add('playing');playing=true}).catch(()=>{})}
  else{bgm.pause();mBtn.classList.remove('playing');playing=false}
}
mBtn.addEventListener('click',toggleMusic);
mBtn.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleMusic()}});
setTimeout(()=>{if(!playing){mBtn.style.borderColor='rgba(212,175,55,.5)';setTimeout(()=>mBtn.style.borderColor='',900)}},3000);

/* ── FAQ ── */
function toggleFaq(btn){
  const item=btn.closest('.faq-item'),open=item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(i=>{i.classList.remove('open');i.querySelector('.faq-q').setAttribute('aria-expanded','false')});
  if(!open){item.classList.add('open');btn.setAttribute('aria-expanded','true')}
}
document.querySelectorAll('.faq-q').forEach(q=>q.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleFaq(q)}}));

/* ── Toast ── */
let tT;
function showToast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>toast.classList.remove('show'),2800)}

/* ── 微信复制 ── */
function copyWechat(){
  const id='l08093084568';
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(id).then(()=>showToast('微信号已复制 · 备注"看完了"'));
  }else{
    const inp=Object.assign(document.createElement('input'),{value:id,style:'position:absolute;opacity:0'});
    document.body.appendChild(inp);inp.select();inp.setSelectionRange(0,99999);
    document.execCommand('copy');document.body.removeChild(inp);
    showToast('微信号已复制 · 备注"看完了"');
  }
}
document.querySelector('.cta-btn-main').addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();copyWechat()}});
document.querySelector('.hero-cta')?.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();copyWechat()}});

/* ── 回到顶部 ── */
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'})}
backTop.addEventListener('click',scrollTop);
backTop.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();scrollTop()}});
const bttBtn=document.getElementById('bttBtn');
bttBtn.addEventListener('click',scrollTop);
bttBtn.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();scrollTop()}});

/* ── 锚点平滑滚动 ── */
document.querySelectorAll('a[href^="#"]').forEach(a=>{
  a.addEventListener('click',e=>{
    const t=document.querySelector(a.getAttribute('href'));
    if(t){e.preventDefault();t.scrollIntoView({behavior:'smooth',block:'start'})}
  });
});
</script>
