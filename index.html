    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 基础颜色统一定义为墨金色 */
        :root {
            --ink-gold: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #d4af37 100%);
            --static-gold: #d4af37;
        }

        body { 
            background-color: #000; 
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; 
            color: var(--static-gold); /* 全局文字改为墨金色 */
            overflow-x: hidden; 
        }

        /* 1. 音乐控制 - 背景完全透明 + 极细线圈 */
        .music-control {
            position: fixed; top: 25px; left: 25px; z-index: 1000;
            width: 40px; height: 40px; 
            border: 0.5px solid rgba(212,175,55,0.4); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; 
            background: transparent; /* 背景完全透明 */
            transition: all 0.5s ease;
        }
        .music-icon { font-size: 14px; color: var(--static-gold); }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .rotating { animation: rotate 4s linear infinite; }

        /* 2. 右上角导航 - 文字改为金色 */
        .floating-nav {
            position: fixed; top: 30px; right: 25px; z-index: 1000;
            display: flex; flex-direction: column; gap: 25px; text-align: right;
        }
        .nav-link { text-decoration: none !important; transition: all 0.3s ease; }
        .main-text { font-size: 14px; color: var(--static-gold); letter-spacing: 4px; display: block; }
        .sub-text { font-size: 9px; color: rgba(212,175,55,0.5); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; display: block; }

        /* 3. 图片展示区 */
        .gallery { width: 100%; background: #000; }
        .gallery img { width: 100%; display: block; }

        /* 4. 黑屏过度区域 - 墨金色电影感文字 */
        .transition-section {
            padding: 150px 20px; text-align: center; background: #000;
            display: flex; flex-direction: column; justify-content: center; min-height: 60vh;
        }
        .transition-section p { 
            color: var(--static-gold); /* 普通段落也改为金色 */
            font-size: 16px; line-height: 2.5; letter-spacing: 4px; 
            opacity: 0.8;
        }
        
        /* 核心醒目墨金色特效 */
        .gold-ink {
            margin-top: 25px; 
            font-size: 20px; 
            font-weight: 500; 
            letter-spacing: 6px;
            background: var(--ink-gold);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 2px 10px rgba(212, 175, 55, 0.3);
        }

        /* 5. 底部布局 */
        .fixed-bg-section {
            position: relative; width: 100%; height: 100vh;
            background: url('img5.jpg') center center no-repeat fixed; background-size: cover;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
        }
        .fixed-bg-section::after {
            content: ""; position: absolute; bottom: 0; width: 100%; height: 85%;
            background: linear-gradient(to top, #000 45%, transparent 100%); z-index: 1;
        }

        .footer-overlay { position: relative; z-index: 10; padding-bottom: 50px; text-align: center; width: 100%; }
        .contact-links { margin-bottom: 35px; display: flex; justify-content: center; flex-wrap: wrap; gap: 25px; }
        .contact-links a { 
            color: var(--static-gold); 
            text-decoration: none; font-size: 14px; border-bottom: 0.5px solid rgba(212,175,55,0.4);
            padding-bottom: 5px; display: flex; align-items: center; gap: 8px; transition: all 0.3s;
        }
        
        .qr-group { display: flex; justify-content: center; gap: 35px; margin-bottom: 25px; }
        .qr-item img { width: 110px; height: 110px; border: 0.5px solid rgba(212,175,55,0.4); border-radius: 2px; background: #fff; padding: 4px; }
        .qr-item span { display: block; margin-top: 12px; font-size: 12px; color: var(--static-gold); letter-spacing: 2px; opacity: 0.8; }
        
        .copyright { color: rgba(212,175,55,0.4); font-size: 9px; margin-top: 40px; letter-spacing: 3px; }

        @media (max-width: 480px) {
            .qr-item img { width: 105px; height: 105px; }
            .gold-ink { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div id="music-btn" class="music-control">
        <audio id="bg-audio" src="bgm.mp3" loop preload="auto"></audio>
        <span class="music-icon"><i class="fa-solid fa-compact-disc"></i></span>
    </div>

    <nav class="floating-nav">
        <a href="https://jwabmbou.studio.site" target="_blank" class="nav-link">
            <span class="main-text">日本語</span>
            <span class="sub-text">Language Service</span>
        </a>
        <a href="https://jwabmsho.studio.site" target="_blank" class="nav-link">
            <span class="main-text">公司</span>
            <span class="sub-text">Corporate Entity</span>
        </a>
    </nav>

    <div class="gallery">
        <img src="img1.jpg" alt="出国咨询">
        <img src="img2.jpg" alt="跨境贸易">
        <img src="img3.jpg" alt="电商运营">
        <img src="img4.jpg" alt="网站网页建设">
    </div>

    <div class="transition-section">
        <p>有想法，但没方向？</p>
        <p>很多时候，选择比努力更需要逻辑</p>
        <p class="gold-ink">可以先找我聊清楚</p>
    </div>

    <div class="fixed-bg-section">
        <div class="footer-overlay">
            <div class="contact-links">
                <a href="tel:08093084568"><i class="fa-solid fa-phone"></i> 电话联络</a>
                <a href="https://line.me/ti/p/szmkPgsXTu/"><i class="fa-brands fa-line"></i> LINE 咨询</a>
                <a href="mailto:jw.abm777@gmail.com"><i class="fa-solid fa-envelope"></i> Email</a>
            </div>

            <div class="qr-group">
                <div class="qr-item">
                    <img src="qr-wechat.png" alt="微信联系">
                    <span>微信联系</span>
                </div>
                <div class="qr-item">
                    <img src="qr-line.png" alt="LINE 账号">
                    <span>LINE 账号</span>
                </div>
            </div>
            <p class="copyright">不讲故事 · 只解决实际问题</p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('music-btn');
        const audio = document.getElementById('bg-audio');
        const icon = document.querySelector('.music-icon');
        let isPlaying = false;
        btn.onclick = function() {
            if (!isPlaying) { audio.play(); icon.classList.add('rotating'); } 
            else { audio.pause(); icon.classList.remove('rotating'); }
            isPlaying = !isPlaying;
        };
    </script>
</body>
</html>
